<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAM Admin</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <main class="admin-wrap">
      <header class="admin-header">
        <div>
          <h1 data-i18n="admin_title">Admin Settings</h1>
          <p data-i18n="admin_subtitle">Workflow tracking, proxy generation, and system health.</p>
        </div>
        <div class="admin-actions">
          <select id="languageSelectAdmin">
            <option value="en">English</option>
            <option value="tr">Türkçe</option>
          </select>
          <a href="/" class="back-link" data-i18n="back_to_mam">Back to MAM</a>
        </div>
      </header>

      <nav class="admin-tabs" id="adminTabs">
        <button type="button" class="admin-tab active" data-tab="apiHelp" data-i18n="api_help_doc_title">API Help Document</button>
        <button type="button" class="admin-tab" data-tab="systemHealth" data-i18n="system_health">System Health</button>
        <button type="button" class="admin-tab" data-tab="workflowTracking" data-i18n="workflow_tracking">Workflow Tracking</button>
        <button type="button" class="admin-tab" data-tab="proxyJobs" data-i18n="proxy_jobs">Proxy Jobs</button>
        <button type="button" class="admin-tab" data-tab="settings" data-i18n="settings">Settings</button>
        <button type="button" class="admin-tab" data-tab="userSettings" data-i18n="user_settings">User Settings</button>
      </nav>

      <section class="admin-panels">
        <article class="admin-card admin-panel active" data-panel="apiHelp">
          <h2 data-i18n="api_help_doc_title">API Help Document</h2>
          <div id="apiGuideDoc" class="api-guide-doc"></div>
        </article>

        <article class="admin-card admin-panel" data-panel="systemHealth">
          <h2 data-i18n="system_health">System Health</h2>
          <div id="ffmpegHealth" class="empty" data-i18n="loading">Loading...</div>
        </article>

        <article class="admin-card admin-panel" data-panel="workflowTracking">
          <h2 data-i18n="workflow_tracking">Workflow Tracking</h2>
          <div id="workflowSummary" class="metrics"></div>
          <div id="workflowRows" class="rows"></div>
        </article>

        <article class="admin-card admin-panel" data-panel="proxyJobs">
          <h2 data-i18n="proxy_jobs">Proxy Jobs</h2>
          <div class="proxy-job-actions">
            <label><input type="checkbox" id="includeTrash" /> <span data-i18n="include_trash">Include trash</span></label>
            <button id="startProxyJobBtn" type="button" data-i18n="start_proxy_job">Start Proxy Job</button>
          </div>
          <div id="proxyJobState" class="admin-note"></div>
          <div class="progress-wrap"><div id="proxyProgress" class="progress-bar"></div></div>
          <div id="proxyJobErrors" class="rows"></div>
        </article>

        <article class="admin-card admin-panel" data-panel="settings">
          <h2 data-i18n="settings">Settings</h2>
          <form id="settingsForm" class="stack">
            <label class="toggle-row">
              <input type="checkbox" name="workflowTrackingEnabled" />
              <span data-i18n="workflow_tracking_enabled">Workflow tracking enabled</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" name="autoProxyBackfillOnUpload" />
              <span data-i18n="auto_proxy_backfill">Auto backfill proxies on upload</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" name="apiTokenEnabled" />
              <span data-i18n="api_token_enabled">Require API token (non-SSO API access)</span>
            </label>
            <label class="toggle-row">
              <input type="checkbox" name="oidcBearerEnabled" />
              <span data-i18n="oidc_bearer_enabled">Accept Keycloak Bearer JWT (preferred for mobile)</span>
            </label>
            <label>
              <span data-i18n="api_token">API Token</span>
              <input name="apiToken" id="apiTokenInput" data-i18n-placeholder="api_token_placeholder" placeholder="Generate token first" />
            </label>
            <label>
              <span data-i18n="oidc_issuer_url">OIDC Issuer URL</span>
              <input name="oidcIssuerUrl" id="oidcIssuerUrlInput" data-i18n-placeholder="oidc_issuer_url_ph" placeholder="http://keycloak:8080/realms/mam" />
            </label>
            <label>
              <span data-i18n="oidc_jwks_url">OIDC JWKS URL</span>
              <input name="oidcJwksUrl" id="oidcJwksUrlInput" data-i18n-placeholder="oidc_jwks_url_ph" placeholder="http://keycloak:8080/realms/mam/protocol/openid-connect/certs" />
            </label>
            <label>
              <span data-i18n="oidc_audience">OIDC Audience (optional, comma separated)</span>
              <input name="oidcAudience" id="oidcAudienceInput" data-i18n-placeholder="oidc_audience_ph" placeholder="mam-web,account" />
            </label>
            <div class="token-actions">
              <button id="rotateApiTokenBtn" type="button" data-i18n="rotate_token">Rotate Token</button>
              <button id="copyApiTokenBtn" type="button" data-i18n="copy_token">Copy Token</button>
            </div>
            <div class="api-help" id="apiHelpBox"></div>
            <button type="submit" data-i18n="save_settings">Save Settings</button>
          </form>
          <div id="settingsMsg" class="admin-note"></div>
        </article>

        <article class="admin-card admin-panel" data-panel="userSettings">
          <h2 data-i18n="user_settings">User Settings</h2>
          <div id="userPermissionsRows" class="rows"></div>
          <div id="userPermissionsMsg" class="admin-note"></div>
        </article>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
