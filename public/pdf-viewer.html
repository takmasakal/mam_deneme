<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dokuman Onizleme</title>
  <style>
    :root {
      --bg: #0f1218;
      --panel: #171c26;
      --panel-2: #1f2633;
      --line: #2e3748;
      --text: #dde6f7;
      --muted: #a6b3cc;
      --accent: #59c2ff;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
    }

    .topbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      box-sizing: border-box;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .topbar input[type="text"],
    .topbar input[type="number"] {
      height: 32px;
      border: 1px solid #3a4458;
      border-radius: 6px;
      background: #0f1420;
      color: #e5ecfa;
      padding: 0 10px;
      outline: none;
    }

    .topbar input[type="text"] {
      flex: 1;
      min-width: 140px;
    }

    .topbar input[type="number"] {
      width: 62px;
      text-align: center;
      padding: 0 4px;
    }

    .topbar button {
      height: 32px;
      border: 1px solid #3a4458;
      border-radius: 6px;
      background: var(--panel-2);
      color: #dbe8ff;
      padding: 0 10px;
      cursor: pointer;
    }

    .topbar button:hover {
      border-color: var(--accent);
      color: #fff;
    }

    .topbar .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .topbar label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .viewer-wrap {
      position: relative;
      height: calc(100% - 48px);
      overflow: visible;
      padding: 10px;
      box-sizing: border-box;
      background: #141a23;
    }

    .pdf-action-bar {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
    }

    .pdf-action-bar.hidden {
      display: none !important;
    }

    .pdf-action-bar button {
      height: 30px;
      border: 1px solid #a31414;
      border-radius: 7px;
      background: #cf1f1f;
      color: #ffffff;
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .pdf-action-bar button:hover {
      border-color: #7f0f0f;
      background: #b51818;
      color: #ffffff;
    }

    .pdf-action-status {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #embedPdfContainer,
    #pdfViewerContainer {
      position: absolute;
      inset: 10px;
      overflow: auto;
      background: #1a202b;
      border: 1px solid #2f3b50;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #textPreview {
      display: none;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 14px;
      overflow: auto;
      background: #f4f7fb;
      color: #1a2233;
      font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      border: 0;
      border-radius: 8px;
    }

    #textPreview mark {
      background: #ffe48a;
      color: #111;
      border-radius: 3px;
      padding: 0 1px;
    }

    #errorBox {
      box-sizing: border-box;
      max-width: 680px;
      margin: 40px auto;
      padding: 16px;
      border: 1px solid #3a3f4a;
      border-radius: 8px;
      background: #171b25;
      color: #d6deef;
      line-height: 1.45;
      display: none;
    }
  </style>
</head>

      const applyEmbedPdfTurkishUiPatch = (root) => {
        if (uiLang !== 'tr' || !root) return () => {};
        const escapeForRegex = (value) => String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const withProtectedPlaceholders = (input, fn) => {
          const raw = String(input || '');
          const placeholders = [];
          const tokenized = raw.replace(/\{[^{}]+\}/g, (m) => {
            const idx = placeholders.length;
            placeholders.push(m);
            return `__PH_${idx}__`;
          });
          const translated = fn(tokenized);
          return translated.replace(/__PH_(\d+)__/g, (_m, i) => placeholders[Number(i)] || _m);
        };
        const patchText = (value) => {
          let out = String(value || '');
          if (!out.trim()) return out;
          out = withProtectedPlaceholders(out, (safeText) => {
            let next = safeText;
            EMBEDPDF_TR_REPLACEMENTS
              .slice()
              .sort((a, b) => b[0].length - a[0].length)
              .forEach(([en, tr]) => {
                next = next.replace(new RegExp(escapeForRegex(en), 'gi'), tr);
              });
            return next;
          });
          return out;
        };
        const patchNode = (node) => {
          if (!node) return;
          if (node.nodeType === Node.TEXT_NODE) {
            const next = patchText(node.nodeValue || '');
            if (next !== node.nodeValue) node.nodeValue = next;
            return;
          }
          if (!(node instanceof Element)) return;
          if (node.shadowRoot) patchNode(node.shadowRoot);
          if (node.childNodes?.length) node.childNodes.forEach((child) => patchNode(child));
          ['title', 'aria-label', 'placeholder'].forEach((attr) => {
            if (!node.hasAttribute(attr)) return;
            const raw = node.getAttribute(attr) || '';
            const next = patchText(raw);
            if (next !== raw) node.setAttribute(attr, next);
          });
        };
        const observers = [];
        const observedRoots = new Set();
        const attachObserver = (targetRoot) => {
          if (!targetRoot || observedRoots.has(targetRoot)) return;
          observedRoots.add(targetRoot);
          const observer = new MutationObserver((entries) => {
            entries.forEach((entry) => {
              if (entry.type === 'characterData') {
                patchNode(entry.target);
                return;
              }
              entry.addedNodes?.forEach((added) => patchNode(added));
              if (entry.target) patchNode(entry.target);
            });
          });
          observer.observe(targetRoot, {
            subtree: true,
            childList: true,
            characterData: true,
            attributes: true,
            attributeFilter: ['title', 'aria-label', 'placeholder']
          });
          observers.push(observer);
        };
        const collectShadowRoots = (baseRoot) => {
          if (!baseRoot || !baseRoot.querySelectorAll) return;
          baseRoot.querySelectorAll('*').forEach((el) => {
            if (el.shadowRoot) {
              patchNode(el.shadowRoot);
              attachObserver(el.shadowRoot);
              collectShadowRoots(el.shadowRoot);
            }
          });
        };
        patchNode(root);
        attachObserver(root);
        collectShadowRoots(root);
        const rootObserver = new MutationObserver((entries) => {
          entries.forEach((entry) => {
            entry.addedNodes?.forEach((added) => patchNode(added));
            if (entry.target) patchNode(entry.target);
            collectShadowRoots(root);
          });
        });
        rootObserver.observe(root, {
          subtree: true,
          childList: true,
          characterData: true,
          attributes: true,
          attributeFilter: ['title', 'aria-label', 'placeholder']
        });
        observers.push(rootObserver);
        return () => observers.forEach((obs) => obs.disconnect());
      };

      const buildTurkishLocaleFromEnglish = (enLocale) => {

        const withProtectedPlaceholders = (input, fn) => {
          const raw = String(input || '');
          const placeholders = [];
          const tokenized = raw.replace(/\{[^{}]+\}/g, (m) => {
            const idx = placeholders.length;
            placeholders.push(m);
            return `__PH_${idx}__`;
          });
          const translated = fn(tokenized);
          return translated.replace(/__PH_(\d+)__/g, (_m, i) => placeholders[Number(i)] || _m);
        };
        const translateString = (raw) => {
          let out = String(raw || '');
          out = withProtectedPlaceholders(out, (safeText) => {
            let next = safeText;
            EMBEDPDF_TR_REPLACEMENTS
              .slice()
              .sort((a, b) => b[0].length - a[0].length)
              .forEach(([en, tr]) => {
                next = next.replace(new RegExp(escapeForRegex(en), 'gi'), tr);
              });
            return next;
          });
          return out;
        };
        const walk = (value) => {
          if (typeof value === 'string') return translateString(value);
          if (Array.isArray(value)) return value.map((item) => walk(item));
          if (!value || typeof value !== 'object') return value;
          const out = {};
          Object.entries(value).forEach(([k, v]) => {
            out[k] = walk(v);
          });
          return out;
        };
        const base = enLocale && typeof enLocale === 'object'
          ? enLocale
          : { code: 'en', name: 'English', translations: {} };
        return {
          ...base,
          code: 'tr',
          name: 'Türkçe',
          translations: walk(base.translations || {})
        };
      };

      const applyEmbedPdfTurkishLocale = async (embedInstance, root) => {
        if (uiLang !== 'tr' || !embedInstance) return;
        try {
          const registry = await embedInstance.registry;
          const i18nPlugin = registry?.getPlugin?.('i18n');
          const i18n = i18nPlugin?.provides?.();
          if (!i18n) {
            applyEmbedPdfTurkishUiPatch(root);
            return;
          }
          const enLocale = i18n.getLocaleInfo?.('en') || i18n.getLocaleInfo?.('en-US');
          const trLocale = buildTurkishLocaleFromEnglish(enLocale);
          if (!i18n.hasLocale?.('tr')) {
            i18n.registerLocale?.(trLocale);
          }
          i18n.setLocale?.('tr');
        } catch (_error) {
          // Fallback DOM patch if i18n capability is not reachable.
          applyEmbedPdfTurkishUiPatch(root);
        }
      };

      const toStrictBool = (value, fallback = false) => {
        if (value == null) return Boolean(fallback);
        if (typeof value === 'boolean') return value;
        if (typeof value === 'number') return value !== 0;
        const raw = String(value).trim().toLowerCase();
        if (!raw) return Boolean(fallback);
        if (['true', '1', 'yes', 'y', 'on'].includes(raw)) return true;
        if (['false', '0', 'no', 'n', 'off', 'null', 'undefined'].includes(raw)) return false;
        return Boolean(fallback);
      };

      const resolvePdfAdvancedPermission = async () => {
        try {
          const response = await fetch('/api/me', { credentials: 'include' });
          if (!response.ok) return requestedPdfAdvanced;
          cachedUserProfile = await response.json().catch(() => ({}));
          return toStrictBool(cachedUserProfile?.canUsePdfAdvancedTools, toStrictBool(cachedUserProfile?.isAdmin, requestedPdfAdvanced));
        } catch (_error) {
          return requestedPdfAdvanced;
        }
      };

      const resolveCurrentUserProfile = async () => {
        if (cachedUserProfile && typeof cachedUserProfile === 'object') return cachedUserProfile;
        try {
          const response = await fetch('/api/me', { credentials: 'include' });
          if (!response.ok) return {};
          cachedUserProfile = await response.json().catch(() => ({}));
          return cachedUserProfile || {};
        } catch (_error) {
          return {};
        }
      };

      const taskToPromise = (task) => {
        if (!task) return Promise.reject(new Error('Task is not available'));
        if (typeof task.toPromise === 'function') return task.toPromise();
        return new Promise((resolve, reject) => {
          if (typeof task.wait !== 'function') return reject(new Error('Task adapter is unavailable'));
          task.wait(
            (value) => resolve(value),
            (reason) => reject(new Error(String(reason?.message || reason || 'Task failed')))
          );
        });
      };

      const arrayBufferToBase64 = (buffer) => {
        const bytes = new Uint8Array(buffer || new ArrayBuffer(0));
        const chunkSize = 0x8000;
        let binary = '';
        for (let i = 0; i < bytes.length; i += chunkSize) {
          const chunk = bytes.subarray(i, i + chunkSize);
          binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
      };

      const mountPdfSaveActions = (embedInstance, allowSave) => {
        const viewerWrap = document.querySelector('.viewer-wrap');
        if (!viewerWrap || !allowSave || !assetId) return;
        const existing = document.getElementById('pdfActionBar');
        if (existing) existing.remove();
        const bar = document.createElement('div');
        bar.id = 'pdfActionBar';
        bar.className = 'pdf-action-bar';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = uiLang === 'tr' ? 'PDF Kaydet' : 'Save PDF';
        const status = document.createElement('span');
        status.className = 'pdf-action-status';
        status.textContent = '';
        bar.appendChild(btn);
        bar.appendChild(status);
        viewerWrap.appendChild(bar);
        bar.classList.add('hidden');

        const setStatus = (text, isError) => {
          status.textContent = String(text || '');
          status.style.color = isError ? '#ff7a7a' : 'var(--muted)';
        };
        const setDirty = (isDirty) => {
          if (isDirty) {
            bar.classList.remove('hidden');
            return;
          }
          bar.classList.add('hidden');
          setStatus('', false);
        };
        const bindEventHook = (hook, callback) => {
          try {
            if (typeof hook === 'function') {
              const unsub = hook(callback);
              if (typeof unsub === 'function') return unsub;
            }
          } catch (_error) {}
          return () => {};
        };

        const pdfChangeKinds = new Set();
        const classifyPdfChangeKind = (eventPayload, fallback) => {
          const raw = String(
            eventPayload?.type
            || eventPayload?.name
            || eventPayload?.action
            || eventPayload?.kind
            || eventPayload?.tool
            || ''
          ).toLowerCase();
          const blob = `${raw} ${String(JSON.stringify(eventPayload || {})).toLowerCase()}`;
          if (blob.includes('redact')) return 'redaction';
          if (blob.includes('insert') && blob.includes('text')) return 'text_insert';
          if (blob.includes('replace') && blob.includes('text')) return 'text_insert';
          if (blob.includes('annotation') || blob.includes('comment') || blob.includes('highlight') || blob.includes('shape')) return 'annotation';
          return fallback || 'unknown';
        };

        const attachDirtyTracking = async () => {
          try {
            const registry = await embedInstance.registry;
            const unsubs = [];
            const readDirtyFromHistory = () => {
              try {
                const historyCap = registry?.getPlugin?.('history')?.provides?.();
                if (!historyCap?.getHistoryState) return false;
                const state = historyCap.getHistoryState();
                if (state?.global?.canUndo) return true;
                const topics = state?.topics && typeof state.topics === 'object' ? Object.values(state.topics) : [];
                return topics.some((item) => Boolean(item?.canUndo));
              } catch (_error) {
                return false;
              }
            };
            const refreshDirty = () => {
              const dirty = readDirtyFromHistory();
              setDirty(dirty);
            };
            const historyCap = registry?.getPlugin?.('history')?.provides?.();
            if (historyCap?.onHistoryChange) {
              unsubs.push(bindEventHook(historyCap.onHistoryChange, () => refreshDirty()));
            }
            const annotationCap = registry?.getPlugin?.('annotation')?.provides?.();
            if (annotationCap?.onAnnotationEvent) {
              unsubs.push(bindEventHook(annotationCap.onAnnotationEvent, (payload) => {
                pdfChangeKinds.add(classifyPdfChangeKind(payload, 'annotation'));
                refreshDirty();
              }));
            }
            const redactionCap = registry?.getPlugin?.('redaction')?.provides?.();
            if (redactionCap?.onRedactionEvent) {
              unsubs.push(bindEventHook(redactionCap.onRedactionEvent, (payload) => {
                pdfChangeKinds.add(classifyPdfChangeKind(payload, 'redaction'));
                refreshDirty();
              }));
            }
            refreshDirty();
            bar.__mamSaveUnsubs = unsubs;
          } catch (_error) {
            // If tracking cannot attach, keep save hidden until explicit save path.
            setDirty(false);
          }
        };
        attachDirtyTracking();

        btn.addEventListener('click', async () => {
          btn.disabled = true;
          setStatus(uiLang === 'tr' ? 'Kaydediliyor...' : 'Saving...', false);
          try {
            const registry = await embedInstance.registry;
            const exportCap = registry?.getPlugin?.('export')?.provides?.();
            if (!exportCap?.saveAsCopy) throw new Error('Export capability is not available');
            const pdfBuffer = await taskToPromise(exportCap.saveAsCopy());
            const pdfBase64 = arrayBufferToBase64(pdfBuffer);
            const saveRes = await fetch(`/api/assets/${encodeURIComponent(assetId)}/pdf/save`, {
              method: 'POST',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                pdfBase64,
                fileName: `asset-${assetId}-edited.pdf`,
                changeKinds: Array.from(pdfChangeKinds)
              })
            });
            const saveData = await saveRes.json().catch(() => ({}));
            if (!saveRes.ok) {
              throw new Error(String(saveData?.error || `HTTP ${saveRes.status}`));
            }
            const latestUrl = String(saveData?.asset?.mediaUrl || '').trim();
            if (latestUrl.startsWith('/uploads/')) {
              const next = new URL(window.location.href);
              next.searchParams.set('file', latestUrl);
              next.searchParams.set('assetId', assetId);
              if (uiLang === 'tr') next.searchParams.set('lang', 'tr');
              window.location.assign(next.toString());
              return;
            }
            setStatus(uiLang === 'tr' ? 'Kaydedildi' : 'Saved', false);
            setDirty(false);
          } catch (error) {
            setStatus(String(error?.message || (uiLang === 'tr' ? 'Kaydetme başarısız' : 'Save failed')), true);
          } finally {
            btn.disabled = false;
          }
        });
      };

      const applyEmbedPdfAdvancedToolsLock = (root, enabled) => {
        if (!root || enabled) return () => {};
        const blockedCommandIds = new Set([
          'annotation:overflow-tools',
          'annotation:overflow-shapes',
          'annotation:add-highlight',
          'annotation:add-underline',
          'annotation:add-strikeout',
          'annotation:add-squiggly',
          'annotation:add-link',
          'annotation:add-comment',
          'annotation:add-text',
          'annotation:add-insert-text',
          'annotation:add-replace-text',
          'annotation:add-stamp',
          'annotation:add-ink',
          'annotation:add-rectangle',
          'annotation:add-circle',
          'annotation:add-line',
          'annotation:add-arrow',
          'annotation:add-polyline',
          'annotation:add-polygon',
          'redaction:redact',
          'redaction:redact-text',
          'redaction:commit-selected',
          'redaction:delete-selected',
          'selection:copy',
          'panel:toggle-comment',
          'panel:toggle-redaction',
          'panel:toggle-annotation-style'
        ]);
        const blockedHints = [
          'annotation', 'comment', 'highlight', 'underline', 'strikeout', 'squiggly',
          'redact', 'redaction', 'copy selection', 'export', 'download',
          'protect', 'permission', 'attach', 'stamp', 'ink', 'shape',
          'annotate', 'araçlar', 'araclar', 'gelişmiş', 'gelismis'
        ];
        const hasBlockedHint = (text) => {
          const normalized = String(text || '').trim().toLowerCase();
          if (!normalized) return false;
          if (normalized.includes('print') || normalized.includes('yazdır') || normalized.includes('yazdir')) {
            return false;
          }
          return blockedHints.some((hint) => normalized.includes(hint));
        };
        const normalizeCommandId = (value) => String(value || '').trim().toLowerCase();
        const HIDDEN_MARK = 'data-mam-pdf-hidden';
        const isActionLikeNode = (node) => {
          if (!(node instanceof Element)) return false;
          const tag = String(node.tagName || '').toLowerCase();
          const role = String(node.getAttribute('role') || '').toLowerCase();
          if (['button', 'a'].includes(tag)) return true;
          if (['menuitem', 'tab', 'option'].includes(role)) return true;
          if (node.hasAttribute('aria-label') || node.hasAttribute('title') || node.hasAttribute('data-command-id')) return true;
          return false;
        };
        const applyHide = (node) => {
          if (!(node instanceof Element)) return;
          if (node.getAttribute(HIDDEN_MARK) === '1') return;
          node.style.display = 'none';
          node.setAttribute('aria-hidden', 'true');
          node.setAttribute(HIDDEN_MARK, '1');
        };
        const hideNode = (node) => {
          if (!(node instanceof Element)) return;
          const commandId = normalizeCommandId(node.getAttribute('data-command-id') || node.getAttribute('commandid'));
          const testId = normalizeCommandId(node.getAttribute('data-testid'));
          const idValue = normalizeCommandId(node.getAttribute('id'));
          const classValue = normalizeCommandId(node.className || '');
          const hardBlockedByCommandFamily = (
            commandId.startsWith('annotation:') ||
            commandId.startsWith('redaction:') ||
            testId.startsWith('annotation:') ||
            testId.startsWith('redaction:')
          );
          if (
            hardBlockedByCommandFamily ||
            blockedCommandIds.has(commandId) ||
            blockedCommandIds.has(testId) ||
            idValue.includes('mode-select-button') ||
            testId.includes('mode-select-button') ||
            classValue.includes('mode-select-button')
          ) {
            applyHide(node);
            return;
          }
          if (isActionLikeNode(node)) {
            const attrs = [
              node.getAttribute('title') || '',
              node.getAttribute('aria-label') || '',
              commandId,
              testId,
              idValue,
              classValue,
              (node.textContent || '').slice(0, 80)
            ];
            if (attrs.some((v) => hasBlockedHint(v))) {
              applyHide(node);
              return;
            }
          }
          if (node.shadowRoot) {
            scanTree(node.shadowRoot);
            attachObserver(node.shadowRoot);
            return;
          }
          node.querySelectorAll?.('*').forEach((child) => {
            const childCommandId = normalizeCommandId(child.getAttribute('data-command-id') || child.getAttribute('commandid'));
            const childTestId = normalizeCommandId(child.getAttribute('data-testid'));
            const childId = normalizeCommandId(child.getAttribute('id'));
            const childClass = normalizeCommandId(child.className || '');
            if (
              childCommandId.startsWith('annotation:') ||
              childCommandId.startsWith('redaction:') ||
              childTestId.startsWith('annotation:') ||
              childTestId.startsWith('redaction:') ||
              blockedCommandIds.has(childCommandId) ||
              blockedCommandIds.has(childTestId) ||
              childId.includes('mode-select-button') ||
              childTestId.includes('mode-select-button') ||
              childClass.includes('mode-select-button')
            ) {
              applyHide(child);
            } else if (isActionLikeNode(child)) {
              const childAttrs = [
                child.getAttribute('title') || '',
                child.getAttribute('aria-label') || '',
                childCommandId,
                childTestId,
                childId,
                childClass,
                (child.textContent || '').slice(0, 80)
              ];
              if (childAttrs.some((v) => hasBlockedHint(v))) {
                applyHide(child);
              }
            }
            if (child.shadowRoot) {
              scanTree(child.shadowRoot);
              attachObserver(child.shadowRoot);
            }
          });
        };
        const scanTree = (scanRoot) => {
          if (!scanRoot) return;
          hideNode(scanRoot);
          if (scanRoot.querySelectorAll) {
            scanRoot.querySelectorAll('*').forEach((el) => hideNode(el));
          }
        };
        const observers = [];
        const observedRoots = new Set();
        const attachObserver = (targetRoot) => {
          if (!targetRoot || observedRoots.has(targetRoot)) return;
          observedRoots.add(targetRoot);
          const observer = new MutationObserver((entries) => {
            entries.forEach((entry) => {
              entry.addedNodes?.forEach((added) => {
                if (!(added instanceof Element)) return;
                hideNode(added);
                if (added.shadowRoot) {
                  scanTree(added.shadowRoot);
                  attachObserver(added.shadowRoot);
                  collectShadowRoots(added.shadowRoot);
                }
                collectShadowRoots(added);
              });
            });
          });
          observer.observe(targetRoot, {
            subtree: true,
            childList: true
          });
          observers.push(observer);
        };
        const collectShadowRoots = (baseRoot) => {
          if (!baseRoot || !baseRoot.querySelectorAll) return;
          baseRoot.querySelectorAll('*').forEach((el) => {
            if (el.shadowRoot) {
              scanTree(el.shadowRoot);
              attachObserver(el.shadowRoot);
              collectShadowRoots(el.shadowRoot);
            }
          });
        };
        scanTree(root);
        attachObserver(root);
        collectShadowRoots(root);
        return () => observers.forEach((obs) => obs.disconnect());
      };


      if (!file || !file.startsWith('/uploads/')) {
        topBar.style.display = 'none';
        errorBox.style.display = 'block';
        errorBox.innerHTML = '<strong>Gecersiz dosya yolu.</strong><br>Sadece <code>/uploads/</code> altindaki dosyalar onizlenebilir.';
        return;
      }

      if (!isPdf) {
        if (embedPdfContainer) embedPdfContainer.style.display = 'none';
        viewerContainer.style.display = 'none';
        textPreview.style.display = 'block';
        let sourceText = '';
        let activeIndex = -1;
        let matchCount = 0;

        const renderMatches = (query) => {
          const q = String(query || '').trim();
          if (!q) {
            textPreview.innerHTML = escapeHtml(sourceText);
            searchMeta.textContent = '';
            activeIndex = -1;
            matchCount = 0;
            return;
          }
          const flags = caseCheck.checked ? 'g' : 'gi';
          const re = new RegExp(escapeRegExp(q), flags);
          let out = '';
          let last = 0;
          let idx = 0;
          let m;
          while ((m = re.exec(sourceText)) !== null) {
            const s = m.index;
            const e = s + m[0].length;
            out += escapeHtml(sourceText.slice(last, s));
            out += `<mark data-idx="${idx}">${escapeHtml(sourceText.slice(s, e))}</mark>`;
            last = e;
            idx += 1;
            if (m[0].length === 0) re.lastIndex += 1;
          }
          out += escapeHtml(sourceText.slice(last));
          textPreview.innerHTML = out;
          matchCount = idx;
          activeIndex = matchCount ? 0 : -1;
          searchMeta.textContent = matchCount ? `1/${matchCount} (Toplam: ${matchCount})` : 'Eslesme yok';
          if (activeIndex >= 0) textPreview.querySelector('mark[data-idx="0"]')?.scrollIntoView({ block: 'center' });
        };

        const move = (delta) => {
          if (!matchCount) return;
          activeIndex = (activeIndex + delta + matchCount) % matchCount;
          searchMeta.textContent = `${activeIndex + 1}/${matchCount} (Toplam: ${matchCount})`;
          textPreview.querySelector(`mark[data-idx="${activeIndex}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
        };

        searchBtn.addEventListener('click', () => renderMatches(searchInput.value));
        searchNextBtn.addEventListener('click', () => move(1));
        searchPrevBtn.addEventListener('click', () => move(-1));
        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            renderMatches(searchInput.value);
          }
        });
        caseCheck.addEventListener('change', () => renderMatches(searchInput.value));

        pagePrevBtn.disabled = true;
        pageNextBtn.disabled = true;
        pageInput.disabled = true;
        zoomOutBtn.disabled = true;
        zoomInBtn.disabled = true;
        pageTotal.textContent = '';

        (async () => {
          try {
            if (!assetId) throw new Error('missing asset id');
            const res = await fetch(`/api/assets/${encodeURIComponent(assetId)}/preview-text`, { credentials: 'include' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            sourceText = String((data && data.text) || '').trim();
            textPreview.textContent = sourceText || 'Onizleme mevcut degil.';
          } catch (_error) {
            textPreview.textContent = 'Onizleme yuklenemedi.';
          }
        })();
        return;
      }

      // Preferred path: EmbedPDF snippet (accurate in-document rendering/highlight).
      const tryInitEmbedPdf = async () => {
        if (!embedPdfContainer) return false;
        try {
          const canUsePdfAdvancedTools = await resolvePdfAdvancedPermission();
          let EmbedPDF = window.EmbedPDF || null;
          if (!EmbedPDF) {
            const mod = await import('/vendor/embedpdf/embedpdf.js');
            EmbedPDF = mod?.default || mod;
          }
          if (!EmbedPDF || typeof EmbedPDF.init !== 'function') return false;
          topBar.style.display = 'none';
          textPreview.style.display = 'none';
          viewerContainer.style.display = 'none';
          errorBox.style.display = 'none';
          embedPdfContainer.style.display = 'block';
          embedPdfContainer.innerHTML = '';
          const embedInstance = EmbedPDF.init({
            type: 'container',
            target: embedPdfContainer,
            src: file,
            disabledCategories: Array.from(new Set([
              ...ALWAYS_DISABLED_CATEGORIES,
              ...(canUsePdfAdvancedTools ? [] : NON_ADVANCED_DISABLED_CATEGORIES)
            ])),
            permissions: canUsePdfAdvancedTools
              ? undefined
              : {
                  overrides: {
                    modifyAnnotations: false,
                    modifyContents: false,
                    assembleDocument: false
                  }
                }
          });
          if (!canUsePdfAdvancedTools) {
            try {
              const registry = await embedInstance.registry;
              const commandsCap = registry?.getPlugin?.('commands')?.provides?.();
              const uiCap = registry?.getPlugin?.('ui')?.provides?.();
              const effectiveDisabledCategories = Array.from(new Set([
                ...ALWAYS_DISABLED_CATEGORIES,
                ...NON_ADVANCED_DISABLED_CATEGORIES
              ]));
              commandsCap?.setDisabledCategories?.(effectiveDisabledCategories);
              uiCap?.setDisabledCategories?.(effectiveDisabledCategories);
              commandsCap?.setDisabledCommands?.(['document:close', 'document-close', 'viewer:close']);
              uiCap?.setDisabledCommands?.(['document:close', 'document-close', 'viewer:close']);
            } catch (_e) {
              // Best-effort permission hardening.
            }
          } else {
            try {
              const registry = await embedInstance.registry;
              const commandsCap = registry?.getPlugin?.('commands')?.provides?.();
              const uiCap = registry?.getPlugin?.('ui')?.provides?.();
              commandsCap?.setDisabledCategories?.(ALWAYS_DISABLED_CATEGORIES);
              uiCap?.setDisabledCategories?.(ALWAYS_DISABLED_CATEGORIES);
              commandsCap?.setDisabledCommands?.(['document:close', 'document-close', 'viewer:close']);
              uiCap?.setDisabledCommands?.(['document:close', 'document-close', 'viewer:close']);
            } catch (_e) {
              // Best-effort for admin mode as well.
            }
          }
          await applyEmbedPdfTurkishLocale(embedInstance, embedPdfContainer);
          applyEmbedPdfTurkishUiPatch(embedPdfContainer);
          const me = await resolveCurrentUserProfile();
          const allowPdfSave = toStrictBool(me?.canUsePdfAdvancedTools, toStrictBool(me?.isAdmin, false));
          mountPdfSaveActions(embedInstance, allowPdfSave);
          return true;
        } catch (_err) {
          return false;
        }
      };

      (async () => {
        const ok = await tryInitEmbedPdf();
        if (ok) return;

      topBar.style.display = 'none';
      viewerContainer.style.display = 'none';
      embedPdfContainer.style.display = 'none';
      errorBox.style.display = 'block';
      errorBox.textContent = 'EmbedPDF yerel paket yuklenemedi. /public/vendor/embedpdf dosyalarini kontrol edin.';
      })();
    })();
  </script>
