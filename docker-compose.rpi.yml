services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: mam-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: mam-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mam_mvp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mam_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: takmasakal/mam:1.0.0
    container_name: mam-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LIBREOFFICE: ${INSTALL_LIBREOFFICE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mam_mvp
      ELASTIC_URL: http://elasticsearch:9200
      ELASTIC_INDEX: mam_assets
      PORT: 3000
      PADDLE_PDX_CACHE_HOME: /app/uploads/.paddlex
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      PADDLE_OCR_ALLOW_FALLBACK: "false"
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: mam
      KEYCLOAK_REALMS: mam
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      USE_OAUTH2_PROXY: "true"
      OFFICE_EDITOR_PROVIDER: ${OFFICE_EDITOR_PROVIDER:-onlyoffice}
      ONLYOFFICE_PUBLIC_URL: http://${PUBLIC_HOST}:8082
      ONLYOFFICE_INTERNAL_URL: http://onlyoffice
      APP_INTERNAL_URL: http://app:3000
    volumes:
      - ${UPLOADS_DIR:-./uploads}:/app/uploads
    restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:8.3
    container_name: mam-onlyoffice
    environment:
      JWT_ENABLED: "false"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        python3 - <<'PY'
        import json
        path = '/etc/onlyoffice/documentserver/default.json'
        with open(path, 'r', encoding='utf-8') as fh:
          data = json.load(fh)
        services = data.setdefault('services', {}).setdefault('CoAuthoring', {})
        rfa = services.setdefault('request-filtering-agent', {})
        rfa['allowPrivateIPAddress'] = True
        rfa['allowMetaIPAddress'] = False
        ext = data.setdefault('externalRequest', {})
        ext.setdefault('action', {})['blockPrivateIP'] = False
        with open(path, 'w', encoding='utf-8') as fh:
          json.dump(data, fh, indent=2)
        PY
        for conf in /etc/onlyoffice/documentserver/nginx/includes/ds-common.conf /etc/nginx/includes/ds-common.conf; do
          if [ -f "$$conf" ] && ! grep -q 'large_client_header_buffers 8 64k' "$$conf"; then
            printf '\n# MAM: browser auth cookies can be large on the same localhost/IP origin.\nclient_header_buffer_size 32k;\nlarge_client_header_buffers 8 64k;\n' >> "$$conf"
          fi
        done
        exec /app/ds/run-document-server.sh
    ports:
      - "8082:80"
    restart: unless-stopped

  keycloak-postgres:
    image: postgres:16
    container_name: mam-keycloak-postgres
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: mam-keycloak
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: ${PUBLIC_HOST}
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak-theme:/opt/keycloak/themes
      - ./deploy/keycloak/mam-rpi-realm.json:/opt/keycloak/data/import/mam-rpi-realm.json:ro
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: mam-oauth2-proxy
    depends_on:
      app:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://${PUBLIC_HOST}:8081/realms/mam
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_LOGIN_URL: http://${PUBLIC_HOST}:8081/realms/mam/protocol/openid-connect/auth
      OAUTH2_PROXY_REDEEM_URL: http://keycloak:8080/realms/mam/protocol/openid-connect/token
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/mam/protocol/openid-connect/certs
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: http://app:3000
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_DOMAINS: ${PUBLIC_HOST}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${PUBLIC_HOST},${PUBLIC_HOST}:*
      OAUTH2_PROXY_REDIRECT_URL: http://${PUBLIC_HOST}:3000/oauth2/callback
      OAUTH2_PROXY_BACKEND_LOGOUT_URL: http://keycloak:8080/realms/mam/protocol/openid-connect/logout?id_token_hint={id_token}&post_logout_redirect_uri=http%3A%2F%2F${PUBLIC_HOST}%3A3000%2Foauth2%2Fstart%3Frd%3D%252F
      OAUTH2_PROXY_SCOPE: "openid profile email"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_CSRF_PER_REQUEST: "false"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_UPSTREAM_TIMEOUT: 15m
    ports:
      - "3000:4180"
    restart: unless-stopped

volumes:
  pg_data:
  es_data:
  keycloak_pg_data:
